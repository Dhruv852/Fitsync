# FitSync — Multi-container orchestration
# Run: docker-compose up --build

services:
  auth-service:
    build: ./auth-service
    container_name: fitsync-auth
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-fitsync_jwt_secret_change_me}
      - JWT_EXPIRES_IN=24h
      - DATA_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - auth_data:/app/data
    networks:
      - fitsync-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  fitness-service:
    build: ./fitness-service
    container_name: fitsync-fitness
    environment:
      - PORT=3002
      - JWT_SECRET=${JWT_SECRET:-fitsync_jwt_secret_change_me}
      - DATA_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - fitness_data:/app/data
    networks:
      - fitsync-network
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  goal-service:
    build: ./goal-service
    container_name: fitsync-goals
    environment:
      - PORT=3003
      - JWT_SECRET=${JWT_SECRET:-fitsync_jwt_secret_change_me}
      - DATA_DIR=/app/data
      - NODE_ENV=production
    volumes:
      - goal_data:/app/data
    networks:
      - fitsync-network
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: fitsync-frontend
    networks:
      - fitsync-network
    depends_on:
      - auth-service
      - fitness-service
      - goal-service

  nginx:
    build: ./nginx
    container_name: fitsync-gateway
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - auth-service
      - fitness-service
      - goal-service
    networks:
      - fitsync-network

# Named volumes persist JSON data across container restarts
volumes:
  auth_data:
  fitness_data:
  goal_data:

networks:
  fitsync-network:
    driver: bridge
