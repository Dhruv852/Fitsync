# FitSync CI — GitHub Actions
# Triggers on every push and pull request to main/master/develop
name: FitSync CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    name: ✅ Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            auth-service/package-lock.json
            fitness-service/package-lock.json
            goal-service/package-lock.json
            frontend/package-lock.json

      - name: 🧪 Test — auth-service
        working-directory: auth-service
        run: |
          npm install
          npm test

      - name: 🧪 Test — fitness-service
        working-directory: fitness-service
        run: |
          npm install
          npm test

      - name: 🧪 Test — goal-service
        working-directory: goal-service
        run: |
          npm install
          npm test

      - name: 🏗️ Build — frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker images (no push)
        run: docker compose build
