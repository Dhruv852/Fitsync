# FitSync API Gateway — routes requests to microservices
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream auth_service {
        server auth-service:3001;
    }

    upstream fitness_service {
        server fitness-service:3002;
    }

    upstream goal_service {
        server goal-service:3003;
    }

    upstream frontend_app {
        server frontend:80;
    }

    server {
        listen 80;
        client_max_body_size 10M;

        location /api/auth {
            proxy_pass http://auth_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/fitness {
            proxy_pass http://fitness_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/goals {
            proxy_pass http://goal_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health/auth {
            proxy_pass http://auth_service/health;
        }
        location /health/fitness {
            proxy_pass http://fitness_service/health;
        }
        location /health/goals {
            proxy_pass http://goal_service/health;
        }

        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
